<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Input Yield — Command Room</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --border: rgba(255,255,255,0.07);
      --text: #e8e9eb; --muted: #7a7d85;
      --teal: #1fb882; --red: #e05252; --red-dim: rgba(224,82,82,0.15);
      --font: 'IBM Plex Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 40px 20px; }
    .wrap { max-width: 520px; margin: 0 auto; }
    .back { font-size: 12px; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 20px; }
    .back:hover { color: var(--text); }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
    .field input, .field select, .field textarea {
      width: 100%; background: #0e0f11; border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 12px; color: var(--text);
      font-family: var(--font); font-size: 13px;
    }
    .field select { appearance: none; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--teal); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-submit {
      width: 100%; padding: 11px; background: var(--teal); color: #000;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--font); margin-top: 6px;
    }
    .error-box { background: var(--red-dim); border: 1px solid var(--red); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--red); margin-bottom: 16px; }
    .success-box { background: rgba(31,184,130,0.1); border: 1px solid var(--teal); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--teal); margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="{% url 'dashboard:index' %}">← Back to dashboard</a>
  <h1>Daily yield input</h1>
  <p class="sub">Factory floor managers submit production metrics per shift.</p>

  {% if error %}
  <div class="error-box">⚠ {{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="success-box">✓ {{ success }}</div>
  {% endif %}

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="row">
        <div class="field">
          <label>Production line</label>
          <select name="line" required>
            <option value="">Select line…</option>
            {% for line in lines %}
            <option value="{{ line.pk }}">{{ line.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>Shift</label>
          <select name="shift" required>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="night">Night</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Units produced</label>
          <input type="number" name="units_produced" min="0" required>
        </div>
        <div class="field">
          <label>Units defective</label>
          <input type="number" name="units_defective" min="0" value="0" required>
        </div>
      </div>
      <div class="field">
        <label>OEE efficiency (%)</label>
        <input type="number" name="oee_efficiency" min="0" max="100" step="0.1" required>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <textarea name="notes" rows="3" placeholder="Any issues, observations…"></textarea>
      </div>
      <button type="submit" class="btn-submit">Submit yield data →</button>
    </form>
  </div>
</div>
</body>
</html>
